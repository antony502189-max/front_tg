services:
  - type: web
    name: frontend-tg
    runtime: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://backend-tg-u57f.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
  - type: web
    name: backend-tg-u57f
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: IIS_BASE_URL
        value: https://iis.bsuir.by/api/v1
      - key: CACHE_TTL_MS
        value: 60000
      - key: STALE_TTL_MS
        value: 300000
      - key: REQUEST_TIMEOUT_MS
        value: 10000
      - key: MAX_RETRIES
        value: 2
      - key: RETRY_DELAY_MS
        value: 250
      - key: MINI_APP_URL
        value: https://frontend-tg.onrender.com
      - key: BACKEND_PUBLIC_URL
        value: https://backend-tg-u57f.onrender.com
      - key: TELEGRAM_WEBHOOK_SECRET
        generateValue: true
      - key: BOT_TOKEN
        sync: false
